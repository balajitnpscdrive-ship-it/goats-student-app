<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>G.O.A.T.S | STUDENT ELITE</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --bg: #020617; --card: rgba(15, 23, 42, 0.7); --accent: #00f2fe; --text: #f8fafc; --house-col: #00f2fe; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; background-image: radial-gradient(circle at 50% -20%, #1e293b, #020617); min-height: 100vh; overflow-x: hidden; }
    .glass { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 30px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
    .view { display: none; } .view.active { display: block; }
    
    .total-score-3d { 
      font-family: 'Bebas Neue', sans-serif; font-size: 130px; line-height: 0.9; color: #fff;
      text-shadow: 0 2px 0 #ccc, 0 4px 0 #bbb, 0 6px 0 #aaa, 0 8px 15px rgba(0,0,0,0.5);
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

    .btn-action { background: linear-gradient(135deg, var(--house-col), #fff); color: #000; border: none; padding: 22px; border-radius: 20px; width: 100%; font-family: 'Bebas Neue'; font-size: 26px; cursor: pointer; box-shadow: 0 10px 40px rgba(0,242,254,0.3); }
    .scan-pill { background: rgba(0,242,254,0.1); border: 1px dashed var(--accent); color: var(--accent); padding: 15px; border-radius: 20px; width: 100%; margin-bottom: 25px; font-weight: 900; cursor: pointer; }
    #reader { width: 100%; border-radius: 20px; overflow: hidden; border: 2px solid var(--accent); margin-bottom: 25px; }
    
    .cat-badge { display: flex; justify-content: space-between; padding: 15px; background: rgba(255,255,255,0.02); border-left: 4px solid var(--house-col); margin-bottom: 10px; border-radius: 12px; }
    .cat-val { font-family: 'Bebas Neue'; font-size: 24px; color: var(--house-col); }
    
    .lb-row { margin-bottom: 18px; }
    .lb-track { height: 8px; background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden; }
    .lb-fill { height: 100%; transition: width 2s cubic-bezier(0.1, 0.9, 0.2, 1); box-shadow: 0 0 15px var(--accent); }

    select { width: 100%; padding: 20px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 15px; margin-bottom: 15px; }
  </style>
</head>
<body>
  <div style="max-width: 480px; margin: 0 auto; padding: 20px;">
    
    <!-- ENTRY AREA -->
    <div id="view-entry" class="view active">
      <div style="text-align:center; padding: 40px 0;">
        <img id="app-logo" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--accent); box-shadow:0 0 30px var(--accent); margin-bottom:30px;">
        <h1 style="font-family:'Bebas Neue'; font-size:62px; letter-spacing:8px;">G.O.A.T.S</h1>
        <p style="opacity:0.4; letter-spacing:4px; font-size:11px; margin-top:-10px;">ELITE CHAMPIONSHIP</p>

        <div style="margin-top:50px;">
          <button id="scan-init-btn" class="scan-pill" onclick="startScanner()">📸 SCAN STUDENT QR ID</button>
          <div id="reader" style="display:none;"></div>

          <div class="glass">
             <span style="font-size:10px; font-weight:900; letter-spacing:2px; color:var(--accent); margin-bottom:15px; display:block;">MANUAL IDENTITY</span>
             <select id="dept-select" onchange="loadStudents()"></select>
             <div id="student-reveal" style="display:none;">
                <select id="student-select"></select>
                <button class="btn-action" onclick="fetchDashboard()">ENTER ARENA</button>
             </div>
          </div>
        </div>
      </div>
    </div>

    <!-- DASHBOARD AREA -->
    <div id="view-dash" class="view">
        <div style="text-align:center; padding:40px 0;">
          <div class="glass">
            <div id="h-pill" style="display:inline-block; padding:8px 20px; border-radius:30px; color:#000; font-weight:900; font-size:11px; margin-bottom:15px;">HOUSE</div>
            <div class="total-score-3d" id="total-pts">000</div>
            <div id="s-name" style="font-family:'Bebas Neue'; font-size:32px; letter-spacing:4px; margin-top:15px;">NAME</div>
          </div>
        </div>

        <div class="glass" style="margin-bottom:30px;">
            <p style="font-weight:900; letter-spacing:3px; font-size:10px; color:var(--house-col); margin-bottom:20px;">⚡ PERFORMANCE BREAKDOWN</p>
            <div id="cat-breakdown"></div>
        </div>

        <div class="glass" style="margin-bottom:30px;">
            <p style="font-weight:900; letter-spacing:3px; font-size:10px; color:var(--house-col); margin-bottom:20px;">🛡️ DEPT HOUSE STANDINGS</p>
            <div id="dept-lb"></div>
        </div>

        <div class="glass" style="margin-bottom:80px;">
            <p style="font-weight:900; letter-spacing:3px; font-size:10px; opacity:0.4; margin-bottom:20px;">🌍 COLLEGE OVERALL RACE</p>
            <div id="overall-lb"></div>
        </div>

        <button class="btn-action" style="background:#1e293b; color:#fff; font-size:18px; margin-bottom:100px;" onclick="location.reload()">SIGNOUT</button>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw9NIY3CG2UwHUGYasgAt0b_UYDg6GzdyiqNCRIW7FlDeoN8EaCTNoFPVAp2689dZzfLQ/exec";
    let appData = {}, scanner = null;
    const api = (p) => fetch(API_URL, { method:"POST", body:JSON.stringify(p) }).then(res=>res.json());

    async function init() {
      appData = await api({ action: "getInitialData" });
      if(appData.logo) document.getElementById('app-logo').src = appData.logo;
      const ds = document.getElementById('dept-select');
      ds.innerHTML = '<option disabled selected>Select Dept</option>';
      appData.depts.forEach(d => ds.add(new Option(d, d)));
    }

    async function startScanner() {
      document.getElementById('scan-init-btn').style.display='none';
      document.getElementById('reader').style.display='block';
      scanner = new Html5Qrcode("reader");
      await scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (txt) => {
        const p = txt.split('|').map(x=>x.trim());
        if(p.length>=3) { scanner.stop(); fetchDashboard(p[2]); }
      });
    }

    async function loadStudents() {
      const res = await api({ action: "getStudentsByDept", dept: document.getElementById('dept-select').value });
      const ss = document.getElementById('student-select');
      ss.innerHTML = '<option disabled selected>Select Your Name</option>';
      res.students.sort((a,b)=>a.name.localeCompare(b.name)).forEach(s => ss.add(new Option(s.name, s.name)));
      document.getElementById('student-reveal').style.display = 'block';
    }

    async function fetchDashboard(scannedName = null) {
      const name = scannedName || document.getElementById('student-select').value;
      const res = await api({ action: "getStudentStats", name });
      renderUI(res);
      document.getElementById('view-entry').classList.remove('active');
      document.getElementById('view-dash').classList.add('active');
    }

    function renderUI(res) {
      document.getElementById('total-pts').innerText = String(res.total).padStart(3,'0');
      document.getElementById('s-name').innerText = res.profile.name;
      const hCfg = appData.houses.find(h=>h.name === res.profile.house);
      if(hCfg) {
        document.documentElement.style.setProperty('--house-col', hCfg.color);
        document.getElementById('h-pill').style.background = hCfg.color;
        document.getElementById('h-pill').innerText = hCfg.name.toUpperCase();
      }
      const cats = ['Activities','Discipline','Academics','Sports','Special'];
      document.getElementById('cat-breakdown').innerHTML = cats.map(c => `<div class="cat-badge"><span>${c}</span><span class="cat-val">${res.breakdown[c]||0}</span></div>`).join('');
      
      const makeLB = (data) => {
        if(!data.length) return '<p style="opacity:0.3; font-size:12px;">No battle data.</p>';
        const max = data[0][1] || 1;
        return data.map(([n, pts]) => {
          const col = appData.houses.find(h=>h.name===n)?.color || '#fff';
          return `<div class="lb-row"><div style="display:flex; justify-content:space-between; font-size:12px; font-weight:700; margin-bottom:5px;"><span>${n}</span><span>${pts}</span></div><div class="lb-track"><div class="lb-fill" style="width:${(pts/max)*100}%; background:${col}; box-shadow:0 0 15px ${col}"></div></div></div>`;
        }).join('');
      };
      document.getElementById('dept-lb').innerHTML = makeLB(res.deptLeaderboard);
      document.getElementById('overall-lb').innerHTML = makeLB(res.overallLeaderboard);
    }
    init();
  </script>
</body>
</html>
