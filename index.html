<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>G.O.A.T.S | GAMER EDITION</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --bg: #020617; --card: rgba(15, 23, 42, 0.85); --accent: #00f2fe; --house-col: #00f2fe; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
    
    /* Animated Nebula Background */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background: linear-gradient(125deg, #020617, #0f172a, #1e1b4b, #020617);
      background-size: 400% 400%; animation: nebula 15s ease infinite;
    }
    @keyframes nebula { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    .container { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .glass { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; }
    
    /* Navigation Bar */
    .nav-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; height: 75px; z-index: 100; display: flex; justify-content: space-around; align-items: center; padding: 0 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
    .nav-item { color: rgba(255,255,255,0.3); font-size: 24px; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .nav-item span { font-size: 9px; font-weight: 900; letter-spacing: 1px; }
    .nav-item.active { color: var(--house-col); transform: translateY(-10px) scale(1.1); text-shadow: 0 0 15px var(--house-col); }

    .view { flex: 1; display: none; padding: 20px; overflow-y: auto; padding-bottom: 120px; scrollbar-width: none; }
    .view::-webkit-scrollbar { display: none; }
    .view.active { display: block; animation: viewIn 0.5s ease-out; }
    @keyframes viewIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* Home Stats */
    .power-core { text-align: center; padding: 40px 20px; position: relative; }
    .aura { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 220px; height: 220px; background: var(--house-col); border-radius: 50%; filter: blur(60px); opacity: 0.15; animation: pulse 3s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.15; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.25; transform: translate(-50%, -50%) scale(1.1); } }
    
    .score-3d { font-family: 'Bebas Neue'; font-size: 130px; line-height: 1; color: #fff; text-shadow: 0 5px 0 #777, 0 10px 20px rgba(0,0,0,0.6); }
    
    .gauge-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 25px; }
    .gauge-cell { padding: 15px; background: rgba(255,255,255,0.02); border-radius: 20px; border-bottom: 3px solid var(--house-col); text-align: center; }
    .gauge-val { font-family: 'Bebas Neue'; font-size: 32px; color: var(--house-col); }
    .gauge-label { font-size: 9px; font-weight: 800; letter-spacing: 2px; color: rgba(255,255,255,0.4); text-transform: uppercase; }

    /* Arena / Leaderboard */
    .arena-title { font-family: 'Bebas Neue'; font-size: 28px; letter-spacing: 3px; color: var(--house-col); margin-bottom: 15px; text-align: center; }
    .lb-card { margin-bottom: 15px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 20px; }
    .lb-meta { display: flex; justify-content: space-between; font-weight: 900; font-size: 12px; margin-bottom: 8px; }
    .lb-bar-bg { height: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; overflow: hidden; }
    .lb-bar { height: 100%; box-shadow: 0 0 15px var(--accent); transition: width 1.5s ease-out; }

    /* Buttons */
    .btn-gamer { background: linear-gradient(135deg, var(--house-col), #fff); color: #000; border: none; padding: 22px; border-radius: 24px; width: 100%; font-family: 'Bebas Neue'; font-size: 26px; cursor: pointer; box-shadow: 0 10px 30px rgba(0,242,254,0.3); }
    select { width: 100%; padding: 22px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15); color: #fff; border-radius: 24px; font-family: inherit; font-size: 16px; margin-bottom: 15px; }
  </style>
</head>
<body>
  
  <div id="loader" style="position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:1000;"><div class="score-3d" style="font-size:30px;">LOADING...</div></div>

  <div class="container">
    
    <!-- VIEW: LOGIN (ONLY SHOWN IF NOT LOGGED IN) -->
    <div id="view-login" class="view active" style="padding: 40px 20px; text-align:center;">
       <img id="app-logo" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--accent); margin-bottom:30px;">
       <h1 style="font-family:'Bebas Neue'; font-size:60px; letter-spacing:8px;">G.O.A.T.S</h1>
       <p style="opacity:0.4; font-size:11px; font-weight:900; letter-spacing:3px;">GAMER EDITION v4.0</p>
       
       <div style="margin-top:50px;">
          <button id="scan-init-btn" class="glass" style="width:100%; padding:20px; color:var(--accent); border:1px dashed var(--accent); font-weight:900; margin-bottom:25px;" onclick="startScanner()">⚡ SCAN POWER ID</button>
          <div id="reader" style="display:none; margin-bottom:25px;"></div>
          
          <div class="glass" style="padding:25px;">
            <span style="font-size:10px; font-weight:900; color:var(--accent); display:block; margin-bottom:15px; letter-spacing:2px;">MANUAL UPLINK</span>
            <select id="dept-select" onchange="loadStudents()"></select>
            <div id="student-reveal" style="display:none;">
              <select id="student-select"></select>
              <button class="btn-gamer" onclick="fetchDashboard()">INITIALIZE</button>
            </div>
          </div>
       </div>
    </div>

    <!-- VIEW: HOME (CORE STATS) -->
    <div id="view-home" class="view">
       <div class="power-core">
          <div class="aura"></div>
          <p id="h-pill" style="font-weight:900; font-size:11px; letter-spacing:3px; color:var(--house-col);">HOUSE NAME</p>
          <h1 id="total-pts" class="score-3d">000</h1>
          <h2 id="s-name" style="font-family:'Bebas Neue'; font-size:32px; letter-spacing:4px; margin-top:10px;">STUDENT NAME</h2>
       </div>

       <div class="gauge-grid" id="cat-grid"></div>
    </div>

    <!-- VIEW: ARENA (LEADERBOARDS) -->
    <div id="view-arena" class="view">
        <h2 class="arena-title">CHAMPIONSHIP ARENA</h2>
        <div class="glass" style="margin-bottom:25px; padding:20px;">
           <p style="font-size:10px; font-weight:900; letter-spacing:2px; color:var(--house-col); margin-bottom:15px;">🛡️ DEPT HOUSE BATTLE</p>
           <div id="dept-lb"></div>
        </div>
        <div class="glass" style="padding:20px;">
           <p style="font-size:10px; font-weight:900; letter-spacing:2px; opacity:0.4; margin-bottom:15px;">🌍 GLOBAL HOUSE RANKING</p>
           <div id="overall-lb"></div>
        </div>
    </div>

    <!-- VIEW: HISTORY (LOGS) -->
    <div id="view-history" class="view">
        <h2 class="arena-title">BATTLE LOGS</h2>
        <div id="logs-list"></div>
    </div>

    <!-- BOTTOM TAB NAVIGATION -->
    <nav id="nav-bar" class="nav-bar glass" style="display:none;">
       <div class="nav-item active" onclick="switchView('home', this)">🏠<span>STATS</span></div>
       <div class="nav-item" onclick="switchView('arena', this)">🏆<span>ARENA</span></div>
       <div class="nav-item" onclick="switchView('history', this)">📜<span>LOGS</span></div>
       <div class="nav-item" onclick="location.reload()">🔓<span>EXIT</span></div>
    </nav>

  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycby4RqyWUJxbYpPAdFtM70npr5ZVqxzeD0BdYNTtSQxvewR23Yo-K2iYJuisIaselNrE/exec";
    let appData = {}, scanner = null;
    const api = (p) => fetch(API_URL, { method:"POST", body:JSON.stringify(p) }).then(res=>res.json());

    async function init() {
      appData = await api({ action: "getInitialData" });
      if(appData.logo) document.getElementById('app-logo').src = appData.logo;
      const ds = document.getElementById('dept-select');
      ds.innerHTML = '<option disabled selected>SELECT DEPT</option>';
      appData.depts.forEach(d => ds.add(new Option(d, d)));
      document.getElementById('loader').style.display = 'none';
    }

    async function startScanner() {
      document.getElementById('scan-init-btn').style.display='none';
      document.getElementById('reader').style.display='block';
      scanner = new Html5Qrcode("reader");
      await scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (txt) => {
        const p = txt.split('|').map(x=>x.trim());
        if(p.length>=3) { scanner.stop(); fetchDashboard(p[2]); }
      });
    }

    async function loadStudents() {
      const res = await api({ action: "getStudentsByDept", dept: document.getElementById('dept-select').value });
      const ss = document.getElementById('student-select');
      ss.innerHTML = '<option disabled selected>SELECT NAME</option>';
      res.students.sort((a,b)=>a.name.localeCompare(b.name)).forEach(s => ss.add(new Option(s.name, s.name)));
      document.getElementById('student-reveal').style.display = 'block';
    }

    async function fetchDashboard(scannedName = null) {
      const name = scannedName || document.getElementById('student-select').value;
      document.getElementById('loader').style.display = 'flex';
      const res = await api({ action: "getStudentStats", name });
      renderUI(res);
      document.getElementById('nav-bar').style.display = 'flex';
      switchView('home');
      document.getElementById('loader').style.display = 'none';
    }

    function switchView(id, el) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + id).classList.add('active');
      if(el) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
      }
    }

    function renderUI(res) {
      document.getElementById('total-pts').innerText = String(res.total).padStart(3,'0');
      document.getElementById('s-name').innerText = res.profile.name;
      const hCfg = appData.houses.find(h=>h.name === res.profile.house);
      if(hCfg) {
        document.documentElement.style.setProperty('--house-col', hCfg.color);
        document.documentElement.style.setProperty('--accent', hCfg.color);
        document.getElementById('h-pill').innerText = hCfg.name.toUpperCase();
      }

      const cats = ['Activities','Discipline','Academics','Sports','Special'];
      document.getElementById('cat-grid').innerHTML = cats.map(c => `
        <div class="gauge-cell">
           <div class="gauge-val">${res.breakdown[c]||0}</div>
           <div class="gauge-label">${c}</div>
        </div>`).join('');

      const makeLB = (data) => {
        const max = data[0][1] || 1;
        return data.map(([n, pts]) => {
          const col = appData.houses.find(h=>h.name===n)?.color || '#fff';
          return `<div class="lb-card">
            <div class="lb-meta"><span>${n.toUpperCase()}</span><span>${pts}</span></div>
            <div class="lb-bar-bg"><div class="lb-bar" style="width:${(pts/max)*100}%; background:${col};"></div></div>
          </div>`;
        }).join('');
      };
      document.getElementById('dept-lb').innerHTML = makeLB(res.deptLeaderboard);
      document.getElementById('overall-lb').innerHTML = makeLB(res.overallLeaderboard);
      
      document.getElementById('logs-list').innerHTML = res.logs.map(l => `
        <div class="glass" style="display:flex; justify-content:space-between; padding:20px; border-radius:15px; margin-bottom:10px;">
           <div style="flex:1;">
             <h4 style="font-size:14px; color:var(--house-col);">${l.cat}</h4>
             <p style="opacity:0.3; font-size:10px;">${new Date(l.date).toLocaleDateString()} • ${l.remarks||'AWARDED'}</p>
           </div>
           <div style="font-family:'Bebas Neue'; font-size:24px;">${l.pts>0?'+':''}${l.pts}</div>
        </div>`).join('');
    }
    init();
  </script>
</body>
</html>
