<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>G.O.A.T.S | STUDENT ELITE</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #020617; --card: rgba(15, 23, 42, 0.7); --accent: #00f2fe; --text: #f8fafc; --house-col: #00f2fe; }
    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
    body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; overflow-x: hidden; background-attachment: fixed; background-image: radial-gradient(circle at 50% -20%, #1e293b, #020617); }
    
    .view { display: none; opacity: 0; transform: scale(0.95); transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .view.active { display: block; opacity: 1; transform: scale(1); }

    /* 3D Dashboard Elements */
    .hero-3d { perspective: 1000px; padding: 40px 20px; text-align: center; }
    .score-card-3d { 
      background: var(--card); border: 2px solid rgba(255,255,255,0.05); border-radius: 40px; 
      padding: 50px 20px; backdrop-filter: blur(20px); box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      position: relative; overflow: hidden;
    }
    .total-score-3d { 
      font-family: 'Bebas Neue', sans-serif; font-size: 130px; line-height: 0.9;
      color: #fff; text-shadow: 
        0 2px 0 #ccc, 0 4px 0 #c5c5c5, 0 6px 0 #bbb, 0 8px 0 #b3b3b3,
        0 10px 0 #aaa, 0 12px 10px rgba(0,0,0,0.4);
      margin-top: 10px; animation: float 4s ease-in-out infinite;
    }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    /* Performance Breakdown */
    .cat-badge { 
      display: flex; justify-content: space-between; align-items: center; 
      padding: 15px 20px; background: rgba(255,255,255,0.02); border-left: 5px solid var(--house-col);
      margin-bottom: 12px; border-radius: 12px;
    }
    .cat-name { font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; }
    .cat-val { font-family: 'Bebas Neue', serif; font-size: 24px; color: var(--house-col); }

    /* Leaderboard Battle Bars */
    .leaderboard-wrap { margin-top: 25px; }
    .lb-row { margin-bottom: 20px; }
    .lb-meta { display: flex; justify-content: space-between; font-weight: 700; font-size: 13px; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 8px; }
    .lb-track { height: 10px; background: rgba(0,0,0,0.3); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.03); }
    .lb-fill { height: 100%; border-radius: 20px; box-shadow: 0 0 20px var(--accent); transition: width 2s cubic-bezier(0.1, 0.9, 0.2, 1); }

    /* Header & Logo */
    .header-logo { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--house-col); padding: 5px; box-shadow: 0 0 30px var(--house-col); margin-bottom: 40px; }
    
    .btn-action { 
      background: linear-gradient(135deg, var(--house-col), #fff); color: #000;
      border: none; padding: 22px; border-radius: 22px; width: 100%; 
      font-weight: 900; font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px;
      cursor: pointer; box-shadow: 0 15px 35px rgba(0,242,254,0.3);
    }
  </style>
</head>
<body>
  <div class="container" style="max-width: 500px; margin: 0 auto; padding: 20px;">
    
    <!-- VIEW: CINEMATIC ENTRY -->
    <div id="view-entry" class="view active">
      <div class="hero-3d">
         <img id="app-logo" class="header-logo">
         <h1 style="font-family:'Bebas Neue', sans-serif; font-size:60px; letter-spacing:8px; margin-bottom:0;">G.O.A.T.S</h1>
         <p style="opacity:0.4; letter-spacing:4px; font-weight:700; font-size:11px; margin-top:-10px;">THE ELITE CHAMPIONSHIP</p>

         <div class="score-card-3d" style="margin-top:50px;">
            <span style="font-size:11px; font-weight:900; letter-spacing:3px; opacity:0.5;">IDENTITY AUTHENTICATION</span>
            <select id="dept-select" onchange="loadStudentsByDept()" style="width:100%; padding:20px; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.1); color:#fff; border-radius:20px; margin-top:20px;"></select>
            
            <div id="student-reveal" style="display:none; margin-top:15px;">
              <select id="student-select" style="width:100%; padding:20px; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.1); color:#fff; border-radius:20px;"></select>
              <button class="btn-action" style="margin-top:20px;" onclick="fetchEliteDashboard()">ENTER ARENA</button>
            </div>
         </div>
      </div>
    </div>

    <!-- VIEW: ELITE DASHBOARD -->
    <div id="view-dash" class="view">
        <div class="hero-3d">
            <div class="score-card-3d">
                <div id="h-pill" class="house-pill" style="background:#fff; margin-bottom:10px;">UNASSIGNED</div>
                <div class="total-score-3d" id="total-pts">000</div>
                <div id="s-name" style="font-family:'Bebas Neue'; font-size:32px; letter-spacing:4px; margin-top:15px;">STUDENT NAME</div>
            </div>
        </div>

        <div class="glass" style="margin-bottom:30px;">
            <p style="font-weight:900; letter-spacing:3px; font-size:10px; color:var(--house-col); margin-bottom:20px;">⚡ BATTLE STATS (BY CATEGORY)</p>
            <div id="cat-breakdown"></div>
        </div>

        <div class="glass" style="margin-bottom:30px;">
            <p style="font-weight:900; letter-spacing:3px; font-size:10px; color:var(--house-col); margin-bottom:20px;">🛡️ DEPARTMENT HOUSE BATTLE</p>
            <div id="dept-leaderboard"></div>
        </div>

        <div class="glass" style="margin-bottom:30px;">
            <p style="font-weight:900; letter-spacing:3px; font-size:10px; opacity:0.5; margin-bottom:20px;">🌍 COLLEGE OVERALL STANDINGS</p>
            <div id="overall-leaderboard"></div>
        </div>

        <button class="btn-action" style="background:#334155; color:#fff; font-size:18px; opacity:0.6;" onclick="location.reload()">SIGNOUT</button>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwWCM394lAPnWpfYJMvLzxflboC1GUCU6nUiGu-nen0UTPtSf-uf_RfxD3a3iWlAFAjrw/exec";
    let appData = {};
    const api = (p) => fetch(API_URL, { method: "POST", body: JSON.stringify(p) }).then(res => res.json());

    async function init() {
      appData = await api({ action: "getInitialData" });
      if(appData.logo) document.getElementById('app-logo').src = appData.logo;
      const ds = document.getElementById('dept-select');
      ds.innerHTML = '<option disabled selected>Select Department</option>';
      appData.depts.forEach(d => ds.add(new Option(d, d)));
    }

    async function loadStudentsByDept() {
      const res = await api({ action: "getStudentsByDept", dept: document.getElementById('dept-select').value });
      const ss = document.getElementById('student-select');
      ss.innerHTML = '<option disabled selected>Select Your Name</option>';
      res.students.sort((a,b)=>a.name.localeCompare(b.name)).forEach(s => ss.add(new Option(s.name, s.name)));
      document.getElementById('student-reveal').style.display = 'block';
    }

    async function fetchEliteDashboard() {
      const res = await api({ action: "getStudentStats", name: document.getElementById('student-select').value });
      renderEliteUI(res);
      document.getElementById('view-entry').className = 'view';
      setTimeout(() => {
        document.getElementById('view-entry').classList.remove('active');
        document.getElementById('view-dash').classList.add('active');
        document.getElementById('view-dash').style.display = 'block';
      }, 300);
    }

    function renderEliteUI(res) {
      document.getElementById('total-pts').innerText = String(res.total).padStart(3, '0');
      document.getElementById('s-name').innerText = res.profile.name;
      const hCfg = appData.houses.find(h => h.name === res.profile.house);
      if(hCfg) {
        document.documentElement.style.setProperty('--house-col', hCfg.color);
        document.getElementById('h-pill').style.background = hCfg.color;
        document.getElementById('h-pill').innerText = hCfg.name.toUpperCase();
      }

      // Categories
      const cats = ['Activities','Discipline','Academics','Sports','Special'];
      document.getElementById('cat-breakdown').innerHTML = cats.map(c => `
        <div class="cat-badge">
            <span class="cat-name">${c}</span>
            <span class="cat-val">${res.breakdown[c] || 0}</span>
        </div>
      `).join('');

      // Render Leaderboard Function
      const makeLB = (data) => {
        const max = data[0][1] || 1;
        return data.map(([name, pts]) => {
            const cfg = appData.houses.find(h => h.name === name);
            return `<div class="lb-row">
                <div class="lb-meta"><span>${name}</span><span>${pts}</span></div>
                <div class="lb-track"><div class="lb-fill" style="width:${(pts/max)*100}%; background:${cfg?.color || '#fff'}; box-shadow: 0 0 15px ${cfg?.color || '#fff'}"></div></div>
            </div>`;
        }).join('');
      };

      document.getElementById('dept-leaderboard').innerHTML = makeLB(res.deptLeaderboard);
      document.getElementById('overall-leaderboard').innerHTML = makeLB(res.overallLeaderboard);
    }

    init();
  </script>
</body>
</html>
