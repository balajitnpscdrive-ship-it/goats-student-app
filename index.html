<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>G.O.A.T.S | ELITE HUB</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
  <!-- ADDED CONFETTI LIBRARY -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --bg: #020617; --card: rgba(15, 23, 42, 0.9); --accent: #00f2fe; --house-col: #00f2fe; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; z-index: -1; background: linear-gradient(125deg, #020617, #0f172a, #1a2e72, #020617); background-size: 400% 400%; animation: nebula 15s infinite; }
    @keyframes nebula { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    /* NEON BLOOM LIGHTING */
    .glass { background: var(--card); backdrop-filter: blur(25px); border: 2px solid rgba(255,255,255,0.08); border-radius: 35px; box-shadow: 0 0 30px rgba(0,242,254,0.1), inset 0 0 15px rgba(255,255,255,0.05); }
    .neon-border { border: 1px solid var(--accent); box-shadow: 0 0 20px var(--accent); }
    
    .score-3d { font-family: 'Bebas Neue'; font-size: 140px; text-shadow: 0 0 20px var(--house-col), 0 5px 0 #777, 0 10px 0 #333; animation: float 4s infinite; text-align: center; }
    @keyframes float { 50% { transform: translateY(-15px); } }

    .btn-main { background: linear-gradient(135deg, var(--house-col), #fff); color: #000; border: none; padding: 22px; border-radius: 25px; width: 100%; font-family: 'Bebas Neue'; font-size: 28px; cursor: pointer; box-shadow: 0 0 40px var(--house-col); transition: 0.3s; }
    .btn-main:active { transform: scale(0.95); filter: brightness(1.2); }

    .pop-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 30px; backdrop-filter: blur(10px); }
    .pop-card { background: var(--card); padding: 40px; border-radius: 40px; text-align: center; border: 2px solid var(--accent); animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 0 100px var(--accent); }
    @keyframes popIn { from { transform: scale(0.5); opacity: 0; } }

    .view { display: none; padding: 20px; transition: 0.5s; }
    .view.active { display: block; animation: vIn 0.8s ease-out; }
    @keyframes vIn { from { opacity: 0; transform: translateY(50px); } }
  </style>
</head>
<body>

  <!-- ACHIEVEMENT POPUP -->
  <div id="pop-overlay" class="pop-overlay" onclick="closePop()">
    <div class="pop-card">
       <div style="font-size:50px;">🎉</div>
       <h1 style="font-family:'Bebas Neue'; font-size:40px; color:var(--accent); margin:10px 0;">LEVEL UP!</h1>
       <p style="opacity:0.8; font-weight:700;">New Points Detected</p>
       <div id="pop-details" style="margin:20px 0; font-size:13px; opacity:0.6;">Check your Battle Records for details.</div>
       <button class="btn-main" style="padding:15px; font-size:20px;">CONTINUE ARENA</button>
    </div>
  </div>

  <div class="container" style="max-width:480px; margin:0 auto;">
    
    <!-- LOGIN VIEW -->
    <div id="view-login" class="view active" style="text-align:center; padding-top:60px;">
       <h1 style="font-family:'Bebas Neue'; font-size:75px; letter-spacing:10px;">G.O.A.T.S</h1>
       <p style="opacity:0.4; letter-spacing:5px; font-weight:900; margin-bottom:50px;">PRO PERFORMANCE HUB</p>
       <button id="scan-init-btn" class="glass neon-border" style="width:100%; padding:20px; font-weight:900; color:var(--accent); margin-bottom:30px;" onclick="haptic(); startScanner()">⚡ SCAN POWER ID</button>
       <div id="reader" style="display:none; margin-bottom:30px; border-radius:30px; overflow:hidden;"></div>
       <div class="glass" style="padding:30px;">
          <select id="dept-select" onchange="haptic(); loadStudents()"></select>
          <div id="student-reveal" style="display:none;">
            <select id="student-select"></select>
            <button class="btn-main" onclick="haptic(); fetchDashboard()">ENTER CORE</button>
          </div>
       </div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="view-dash" class="view">
        <div class="glass" style="padding:40px 20px; text-align:center; margin-top:30px;">
           <p id="h-pill" style="font-weight:900; letter-spacing:4px; font-size:12px; margin-bottom:15px; color:var(--house-col);">HOUSE</p>
           <h1 id="total-pts" class="score-3d">000</h1>
           <h2 id="s-name" style="font-family:'Bebas Neue'; font-size:42px; letter-spacing:6px; margin-top:20px;">NAME</h2>
        </div>

        <p style="font-weight:900; font-size:11px; letter-spacing:3px; color:var(--house-col); margin:25px 0 15px 0; text-align:center;">🛡️ POWER CATEGORIES</p>
        <div id="cat-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>

        <p style="font-weight:900; font-size:11px; letter-spacing:3px; color:var(--house-col); margin:40px 0 15px 0; text-align:center;">🏆 DEPARTMENT RANKING</p>
        <div class="glass" id="dept-lb" style="padding:25px;"></div>

        <p style="font-weight:900; font-size:11px; letter-spacing:3px; opacity:0.4; margin:40px 0 15px 0; text-align:center;">🌍 COLLEGE OVERAL RANKING</p>
        <div class="glass" id="overall-lb" style="padding:25px;"></div>

        <p style="font-weight:900; font-size:11px; letter-spacing:3px; color:var(--house-col); margin:40px 0 15px 0; text-align:center;">📜 ACHIEVEMENT RECORD</p>
        <div id="logs-list"></div>

        <button class="btn-main" style="background:#1e293b; color:#fff; font-size:20px; margin:60px 0 120px 0; box-shadow:none; border:1px solid #ffffff11;" onclick="signOut()">SIGN OUT</button>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbySnWQ8DAmasm9wyPWutRmZRgU7FZwvoZlcrA_suMMFxfPpczbRWpzqgv4T6YrMK-SpWw/exec";
    const CAT_COLS = {'Activities':'#bf5af2','Discipline':'#32d74b','Academics':'#0a84ff','Sports':'#ff9f0a','Special':'#ff375f'};
    let appData = {}, scanner = null, audioCtx = null;
    const api = (p)=>fetch(API_URL,{method:"POST",body:JSON.stringify(p)}).then(res=>res.json());
    
    function haptic() { if(window.navigator.vibrate)window.navigator.vibrate(12); }
    function playClap() { try{ if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)(); const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.type='triangle'; const n=audioCtx.currentTime; o.frequency.setValueAtTime(400,n); o.frequency.exponentialRampToValueAtTime(100,n+0.2); g.gain.setValueAtTime(0.5,n); g.gain.exponentialRampToValueAtTime(0.01,n+0.2); o.start(n); o.stop(n+0.2); }catch(e){} }
    function anim(obj,s,e,dur){ let sT=null; const step=(t)=>{ if(!sT)sT=t; const p=Math.min((t-sT)/dur,1); obj.innerHTML=String(Math.floor(p*(e-s)+s)).padStart(3,'0'); if(p<1)window.requestAnimationFrame(step); }; window.requestAnimationFrame(step); }

    async function init() {
       // CHECK SAVED LOGIN
       const saved = localStorage.getItem('goats_student_name');
       if(saved) {
         document.getElementById('view-login').style.display = 'none';
         fetchDashboard(saved);
       }
       appData=await api({action:"getInitialData"});
       const ds=document.getElementById('dept-select'); ds.innerHTML='<option disabled selected>CHOOSE DEPARTMENT</option>';
       appData.depts.forEach(d=>ds.add(new Option(d,d)));
    }

    async function startScanner() {
       document.getElementById('scan-init-btn').style.display='none'; document.getElementById('reader').style.display='block';
       scanner=new Html5Qrcode("reader"); await scanner.start({facingMode:"environment"},{fps:15,qrbox:250},(txt)=>{ const p=txt.split('|').map(x=>x.trim()); if(p.length>=3){ scanner.stop(); haptic(); fetchDashboard(p[0]); } });
    }

    async function loadStudents(){ const res=await api({action:"getStudentsByDept",dept:document.getElementById('dept-select').value}); const ss=document.getElementById('student-select'); ss.innerHTML='<option disabled selected>SELECT YOUR NAME</option>'; res.students.sort((a,b)=>a.name.localeCompare(b.name)).forEach(s=>ss.add(new Option(s.name,s.name))); document.getElementById('student-reveal').style.display='block'; }

    async function fetchDashboard(n=null){
       const name = n || document.getElementById('student-select').value;
       const res = await api({action:"getStudentStats",name});
       localStorage.setItem('goats_student_name', name);
       
       // CHECK FOR NEW POINTS
       const oldTotal = parseInt(localStorage.getItem('goats_last_total') || 0);
       if(res.total > oldTotal && oldTotal > 0) {
         setTimeout(triggerCelebration, 2000);
       }
       localStorage.setItem('goats_last_total', res.total);

       render(res);
       document.getElementById('view-login').classList.remove('active');
       document.getElementById('view-dash').classList.add('active');
       window.scrollTo(0,0);
    }

    function triggerCelebration() {
      playClap();
      confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#00f2fe','#bf5af2','#32d74b'] });
      document.getElementById('pop-overlay').style.display = 'flex';
    }

    function closePop() { document.getElementById('pop-overlay').style.display='none'; }
    function signOut() { localStorage.clear(); location.reload(); }

    function render(res) {
       anim(document.getElementById('total-pts'),0,res.total,1500);
       document.getElementById('s-name').innerText=res.profile.name;
       const hC=appData.houses.find(h=>h.name===res.profile.house); if(hC){ document.documentElement.style.setProperty('--house-col',hC.color); document.documentElement.style.setProperty('--accent',hC.color); document.getElementById('h-pill').innerText=hC.name; }
       
       document.getElementById('cat-grid').innerHTML=['Activities','Discipline','Academics','Sports','Special'].map(c=>{
         const col=CAT_COLS[c]||'#fff'; return `<div class="glass" style="text-align:center; padding:20px; border-bottom:4px solid ${col};"><div style="font-family:'Bebas Neue'; color:${col}; font-size:35px;">${res.breakdown[c]||0}</div><div style="font-size:9px; font-weight:900; opacity:0.3; letter-spacing:2px; margin-top:5px;">${c.toUpperCase()}</div></div>`;
       }).join('');

       const lb=(d)=>{ if(!d.length)return '<p style="opacity:0.2; font-size:12px; text-align:center;">No data in arena...</p>'; const m=d[0][1]||1; return d.map(([n,p])=>{ const c=appData.houses.find(h=>h.name===n)?.color||'#fff'; return `<div style="margin-bottom:20px;"><div style="display:flex; justify-content:space-between; font-weight:900; font-size:11px;"><span>${n.toUpperCase()}</span><span>${p}</span></div><div style="height:10px; border-radius:5px; background:rgba(255,255,255,0.05); overflow:hidden; margin-top:5px;"><div style="height:100%; transition:width 2s; width:${(p/m)*100}%; background:${c}; box-shadow:0 0 15px ${c};"></div></div></div>`; }).join(''); };
       document.getElementById('dept-lb').innerHTML=lb(res.deptLeaderboard); 
       document.getElementById('overall-lb').innerHTML=lb(res.overallLeaderboard);
       
       document.getElementById('logs-list').innerHTML=res.logs.map(l=>{ const isP=l.pts>0; return `<div class="glass" style="display:flex; justify-content:space-between; padding:20px; border-radius:25px; margin-bottom:12px; border-left:4px solid ${isP?'#32d74b':'#ff375f'};"><div style="flex:1;"><h4 style="font-family:'Bebas Neue'; color:${isP?'#32d74b':'#ff375f'}; font-size:19px;">${l.cat.toUpperCase()}</h4><p style="opacity:0.4; font-size:10px; font-weight:700;">${new Date(l.date).toLocaleString([],{dateStyle:'medium',timeStyle:'short'})} • ${l.by}</p><p style="font-size:11px; margin-top:5px; opacity:0.8;">${l.remarks||''}</p></div><div style="font-family:'Bebas Neue'; font-size:32px; color:${isP?'#32d74b':'#ff375f'};">${isP?'+':''}${l.pts}</div></div>`; }).join('');
    }
    init();
  </script>
</body>
</html>
