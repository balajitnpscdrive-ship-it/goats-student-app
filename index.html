<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>G.O.A.T.S | ULTIMATE HUB</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --bg: #020617; --card: rgba(15, 23, 42, 0.98); --accent: #00f2fe; --house-col: #00f2fe; }
    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
    body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
    body::before { content:''; position:fixed; inset:0; z-index:-1; background:linear-gradient(125deg,#020617,#0f172a,#111b40,#020617); background-size:400% 400%; animation:neb 20s infinite; }
    @keyframes neb { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    .clg-header { display: flex; align-items: center; justify-content: space-between; padding: 25px 20px; background: rgba(0,0,0,0.2); border-bottom: 2px solid var(--accent); backdrop-filter: blur(20px); }
    .fn-pic { width: 65px; height: 65px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 0 20px var(--accent); }
    .clg-logo { height: 50px; filter: drop-shadow(0 0 10px var(--accent)); }
    #splash { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1.5s cubic-bezier(0.8, 0, 0, 1); }
    .glass { background: var(--card); backdrop-filter: blur(25px); border-radius: 35px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
    .goat-card { width: 290px; height: 410px; margin: 30px auto; position: relative; background: linear-gradient(135deg, var(--house-col), #000); border-radius: 25px; border: 5px solid #fff; box-shadow: 0 0 60px var(--house-col); overflow: hidden; }
    .card-photo { width: 100%; height: 60%; object-fit: cover; border-bottom: 4px solid #fff; }
    .card-s { position: absolute; top: 15px; right: 15px; width: 55px; height: 55px; filter: drop-shadow(0 0 10px #fff); }
    .score-3d { font-family: 'Bebas Neue'; font-size: 140px; text-shadow: 0 10px 0 #444, 0 15px 30px rgba(0,0,0,1); text-align: center; animation: fl 4s infinite; }
    @keyframes fl { 50%{transform:translateY(-15px)} }
    .prog-track { height: 12px; background: rgba(0,0,0,0.5); border-radius: 10px; overflow: hidden; margin-top: 10px; }
    .prog-fill { height: 100%; transition: width 2s cubic-bezier(0.1, 0.9, 0.2, 1); box-shadow: 0 0 20px var(--house-col); }
    .btn-main { background: linear-gradient(135deg, var(--house-col), #fff); color: #000; border: none; padding: 22px; border-radius: 25px; width: 100%; font-family: 'Bebas Neue'; font-size: 28px; cursor: pointer; box-shadow: 0 15px 40px rgba(0,242,254,0.4); }
    .pop-over { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 30px; backdrop-filter: blur(15px); }
  </style>
</head>
<body>
  <div id="splash"><img id="sp-img" style="width:130px; border-radius:50%; box-shadow: 0 0 60px var(--accent); border: 2px solid #fff;"><h1 style="font-family:'Bebas Neue'; letter-spacing:15px; margin-top:30px; font-size:40px;">INITIALIZING...</h1></div>
  <div id="hof" style="display:none; background:rgba(0,242,254,0.1); padding:12px; overflow:hidden;"><div style="display:inline-block; animation:tick 25s linear infinite; white-space:nowrap; font-weight:900; font-size:11px; letter-spacing:2px;" id="hof-tx">🏆 SYNCING REAL-TIME ARENA...</div></div>
  <div id="pop-over" class="pop-over" onclick="cPop()"><div style="background:var(--card); padding:40px; border-radius:40px; text-align:center; border:3px solid var(--accent);"><div style="font-size:70px;">🏆</div><h1 style="font-family:'Bebas Neue'; font-size:55px;">NEW VICTORY!</h1><p id="pop-wish" style="font-weight:900; margin-top:10px;"></p><button class="btn-main" style="margin-top:30px; font-size:22px;">PROCEED</button></div></div>
  <div class="container" style="max-width:480px; margin:0 auto;">
    <header id="clg-header" class="clg-header" style="display:none;"><img src="assets/founder.png" class="fn-pic" onerror="this.src='https://img.icons8.com/isometric/100/star.png'"><img id="header-logo" class="clg-logo"><div style="text-align:right;"><p style="font-size:9px; font-weight:900; opacity:0.4;">TOWARDS EXCELLENCE</p><p style="font-family:'Bebas Neue'; font-size:20px;">BATTLE HUB</p></div></header>
    <div id="view-login" style="padding:40px 20px; text-align:center;"><h1 style="font-family:'Bebas Neue'; font-size:75px; letter-spacing:12px;">G.O.A.T.S</h1><p style="opacity:0.4; letter-spacing:6px; font-weight:900; margin-bottom:50px;">PRO PERFORMANCE HUB</p><button id="scan-b" class="glass" style="width:100%; border:1px dashed var(--accent); color:var(--accent); font-weight:900;" onclick="startScan()">⚡ SCAN POWER ID</button><div id="reader" style="display:none; margin-bottom:30px; border-radius:30px; overflow:hidden;"></div><div class="glass"><select style="width:100%; padding:20px; background:rgba(0,0,0,0.6); border-radius:20px; color:#fff;" id="dept-s" onchange="loadS()"></select><div id="s-reveal" style="display:none; margin-top:15px;"><select style="width:100%; padding:20px; background:rgba(0,0,0,0.6); border-radius:20px; color:#fff;" id="std-s"></select><button class="btn-main" style="margin-top:20px;" onclick="fetchD()">INITIALIZE</button></div></div></div>
    <div id="view-dash" style="display:none; padding:20px;">
        <div id="top-honors"></div>
        <div class="glass" style="text-align:center;"><p style="font-weight:900; font-size:11px; color:var(--house-col); letter-spacing:3px;">RANK PROGRESSION</p><h2 id="r-text" style="font-family:'Bebas Neue'; font-size:35px; margin:10px 0;">ROOKIE</h2><div class="prog-track"><div id="r-fill" class="prog-fill"></div></div><p id="r-hint" style="opacity:0.3; font-size:11px; margin-top:10px;">LOADING STATISTICS...</p></div>
        <div style="padding:40px 0;"><p id="h-pill" style="font-weight:900; letter-spacing:6px; color:var(--house-col); text-align:center;">HOUSE</p><h1 id="total-pts" class="score-3d">000</h1><h2 id="sn" style="font-family:'Bebas Neue'; font-size:45px; letter-spacing:6px; text-align:center;">NAME</h2></div>
        <div class="glass" style="text-align:center;"><div id="cap-area"><div class="goat-card"><img id="cp" class="card-photo" src="https://via.placeholder.com/300"><img id="cs" class="card-s" onerror="this.src=appData.logo"><div style="font-family:'Bebas Neue'; font-size:30px; margin-top:10px;" id="cn">PLAYER</div><div style="font-family:'Bebas Neue'; font-size:55px;" id="cpts">000</div></div></div><button class="glass" style="width:100%; border:2px dashed #fff; margin:20px 0; padding:15px;" onclick="document.getElementById('ph-i').click()">📸 UPLOAD PHOTO</button><input type="file" id="ph-i" accept="image/*" hidden onchange="hPh(this)"><button class="btn-main" onclick="dwC()">💾 SAVE CARD</button></div>
        <div id="c-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:18px;"></div>
        <h3 style="font-family:'Bebas Neue'; font-size:26px; text-align:center; letter-spacing:4px; margin-top:40px;">🎖️ DEPT RANKING</h3><div class="glass" id="d-lb"></div>
        <h3 style="font-family:'Bebas Neue'; font-size:26px; text-align:center; letter-spacing:4px; margin-top:30px;">🌍 COLLEGE OVERALL</h3><div class="glass" id="o-lb"></div>
        <h3 style="font-family:'Bebas Neue'; font-size:26px; text-align:center; letter-spacing:4px; margin-top:30px;">📜 BATTLE RECORDS</h3><div id="l-list"></div>
        <button class="btn-main" style="background:#1e293b; color:#fff; font-size:20px; margin:80px 0 150px 0; box-shadow:none;" onclick="sO()">SIGN OUT</button>
    </div>
  </div>
  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyQOV-EzyyeP3xYH-zfxaoC9Kap7YblIU638HtRYi8lV7i55xW77uP9ALSuDs0W6ca5ig/exec";
    const HOUSE_S = {'BOSCO':'assets/bosco_shield.png','SAVIO':'assets/savio_shield.png','THOMAS':'assets/thomas_shield.png','RUVA':'assets/ruva_shield.png'};
    const CAT_C = {'Activities':'#bf5af2','Discipline':'#32d74b','Academics':'#0a84ff','Sports':'#ff9f0a','Special':'#ff375f'};
    let appData={}, scanner=null, audioCtx=null;
    const api=(p)=>fetch(API_URL,{method:"POST",body:JSON.stringify(p)}).then(res=>res.json());
    function haptic(){ if(window.navigator.vibrate)window.navigator.vibrate(12); }
    function pClap(){ try{ if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)(); const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.type='triangle'; const n=audioCtx.currentTime; o.frequency.setTargetAtTime(400,n,0.05); g.gain.setTargetAtTime(0.5,n,0.05); g.gain.exponentialRampToValueAtTime(0.01,n+0.3); o.start(n); o.stop(n+0.3); }catch(e){} }
    function anim(obj,s,e,dur){ let sT=null; const step=(t)=>{ if(!sT)sT=t; const p=Math.min((t-sT)/dur,1); obj.innerHTML=Math.floor(p*(e-s)+s); if(p<1)window.requestAnimationFrame(step); }; window.requestAnimationFrame(step); }
    async function init(){
       const saved=localStorage.getItem('g_sn'); if(saved)fetchD(saved);
       appData=await api({action:"getInitialData"}); document.getElementById('sp-img').src=appData.logo; document.getElementById('header-logo').src=appData.logo;
       const ds=document.getElementById('dept-s'); ds.innerHTML='<option disabled selected>CHOOSE DEPARTMENT</option>';
       appData.depts.forEach(d=>ds.add(new Option(d,d))); setTimeout(()=>{document.getElementById('splash').style.transform='translateY(-100%)';},2500);
    }
    async function startScan(){ document.getElementById('scan-b').style.display='none'; document.getElementById('reader').style.display='block'; scanner=new Html5Qrcode("reader"); await scanner.start({facingMode:"environment"},{fps:15,qrbox:250},(txt)=>{ const p=txt.split('|').map(x=>x.trim()); if(p.length>=3){ scanner.stop(); haptic(); fetchD(p[0]); } }); }
    async function loadS(){ const res=await api({action:"getStudentsByDept",dept:document.getElementById('dept-s').value}); const ss=document.getElementById('std-s'); ss.innerHTML='<option disabled selected>SELECT NAME</option>'; res.students.forEach(s=>ss.add(new Option(s.name,s.name))); document.getElementById('s-reveal').style.display='block'; }
    async function fetchD(n=null){
       const name=n||document.getElementById('std-s').value; const res=await api({action:"getStudentStats",name});
       const oldT=parseInt(localStorage.getItem('g_lt')||0); if(res.total>oldT && oldT>0) celeb(res);
       localStorage.setItem('g_sn',name); localStorage.setItem('g_lt',res.total);
       render(res); document.getElementById('view-login').style.display='none'; document.getElementById('clg-header').style.display='flex'; document.getElementById('view-dash').style.display='block'; document.getElementById('hof').style.display='block'; window.scrollTo(0,0);
    }
    setInterval(()=>{ const sn=localStorage.getItem('g_sn'); if(sn && document.getElementById('view-dash').style.display==='block') { api({action:"getStudentStats",name:sn}).then(res=>{ const ot=parseInt(localStorage.getItem('g_lt')||0); if(res.total>ot){ localStorage.setItem('g_lt',res.total); celeb(res); render(res); } }); } },30000);
    function celeb(r){ pClap(); haptic(); confetti({particleCount:150,spread:70,origin:{y:0.6},zIndex:20000}); document.getElementById('pop-wish').innerText=`Congratulations ${r.profile.name}! You just earned new points!`; document.getElementById('pop-over').style.display='flex'; }
    function cPop(){ document.getElementById('pop-over').style.display='none'; }
    function sO(){ localStorage.clear(); location.reload(); }
    function hPh(inp){ if(inp.files && inp.files[0]){ const r=new FileReader(); r.onload=(e)=>document.getElementById('cp').src=e.target.result; r.readAsDataURL(inp.files[0]); } }
    function dwC(){ html2canvas(document.querySelector("#cap-area")).then(c=>{ const l=document.createElement('a'); l.download=`GOATS_CARD.png`; l.href=c.toDataURL(); l.click(); }); }
    function render(res){
       anim(document.getElementById('total-pts'),0,res.total,1500); document.getElementById('sn').innerText=res.profile.name; document.getElementById('cn').innerText=res.profile.name; document.getElementById('cpts').innerText=res.total;
       const hC=appData.houses.find(h=>h.name===res.profile.house); if(hC){ document.documentElement.style.setProperty('--house-col',hC.color); document.documentElement.style.setProperty('--accent',hC.color); document.getElementById('h-pill').innerText=hC.name; document.getElementById('cs').src=HOUSE_S[hC.name.toUpperCase()]||appData.logo; }
       let rank="ROOKIE",next=100; if(res.total>=500){rank="LEGENDARY GOAT";next=0;}else if(res.total>=300){rank="DIAMOND TIER";next=500;}else if(res.total>=100){rank="GOLD TIER";next=300;}
       document.getElementById('r-text').innerText=rank; document.getElementById('r-fill').style.width=(next>0?(res.total/next)*100:100)+"%"; document.getElementById('r-hint').innerText=next>0?(next-res.total)+" PTS TO NEXT TIER":"MAX RANK REACHED";
       document.getElementById('hof-tx').innerText="👑 GLOBAL CHAMPIONS: "+res.overallLeaderboard.slice(0,3).map(x=>`${x[0]} [${x[1]} PTS]`).join('  |  ');
       const dr=res.deptLeaderboard.findIndex(x=>x[0].trim().toLowerCase()===res.profile.name.trim().toLowerCase())+1;
       if(dr>0 && dr<=10){ document.getElementById('top-honors').innerHTML=`<div class="glass" style="background:rgba(50,215,75,0.1); border:2px solid #32d74b; text-align:center;"><h3 style="font-family:'Bebas Neue'; font-size:26px; color:#32d74b;">🎊 WEEKLY TOP 10!</h3><p style="font-size:12px; font-weight:900;">Rank #${dr} in your Dept. Keep soaring!</p></div>`; }
       document.getElementById('c-grid').innerHTML=['Activities','Discipline','Academics','Sports','Special'].map(c=>{ const col=CAT_C[c]||'#fff'; return `<div class="glass" style="margin:0; text-align:center; padding:20px; border-bottom:4px solid ${col};"><div style="font-family:'Bebas Neue'; color:${col}; font-size:35px;">${res.breakdown[c]||0}</div><div style="font-size:9px; font-weight:900; opacity:0.3; letter-spacing:2px; margin-top:5px;">${c.toUpperCase()}</div></div>`; }).join('');
       const lb=(d)=>{ if(!d.length)return '<p style="text-align:center; opacity:0.2;">SYNCING...</p>'; const m=d[0][1]||1; return d.map(([n,p])=>{ const c=appData.houses.find(h=>h.name===n)?.color||'#fff'; return `<div style="margin-bottom:18px;"><div style="display:flex; justify-content:space-between; font-weight:900; font-size:11px;"><span>${n.toUpperCase()}</span><span>${p}</span></div><div class="prog-track" style="margin-top:6px;"><div style="height:100%; width:${(p/m)*100}%; background:${c}; box-shadow:0 0 15px ${c};"></div></div></div>`; }).join(''); };
       document.getElementById('d-lb').innerHTML=lb(res.deptLeaderboard); document.getElementById('o-lb').innerHTML=lb(res.overallLeaderboard);
       document.getElementById('l-list').innerHTML=res.logs.map(l=>{ const isP=l.pts>0; return `<div class="glass" style="display:flex; justify-content:space-between; padding:25px; border-left:5px solid ${isP?'#32d74b':'#ff375f'};"><div style="flex:1;"><h4 style="font-family:'Bebas Neue'; color:${isP?'#32d74b':'#ff375f'}; font-size:20px;">${l.cat.toUpperCase()}</h4><p style="opacity:0.4; font-size:10px;">${new Date(l.date).toLocaleString([],{dateStyle:'medium',timeStyle:'short'})} • ${l.by}</p><p style="font-size:11px; margin-top:8px; opacity:0.8;">${l.remarks||''}</p></div><div style="font-family:'Bebas Neue'; font-size:32px; color:${isP?'#32d74b':'#ff375f'};">${isP?'+':''}${l.pts}</div></div>`; }).join('');
    }
    init();
  </script>
</body>
</html>
