<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>G.O.A.T.S | ELITE ANALYTICS</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --bg: #020617; --card: rgba(15, 23, 42, 0.8); --accent: #00f2fe; --house-col: #00f2fe; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; background-image: radial-gradient(circle at 50% -20%, #1e293b, #020617); min-height: 100vh; }
    .glass { background: var(--card); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); border-radius: 35px; padding: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
    .view { display: none; } .view.active { display: block; animation: zoomIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
    @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

    .score-3d { font-family: 'Bebas Neue'; font-size: 130px; line-height: 0.9; text-shadow: 0 4px 0 #bbb, 0 8px 0 #999, 0 12px 20px rgba(0,0,0,0.6); animation: float 4s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

    /* INFOGRAPHIC GRID */
    .infographic-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px; }
    .gauge-box { text-align: center; position: relative; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); }
    .gauge-svg { width: 100px; height: 100px; transform: rotate(-90deg); }
    .gauge-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 8; }
    .gauge-fill { fill: none; stroke: var(--house-col); stroke-width: 8; stroke-linecap: round; stroke-dasharray: 251.2; stroke-dashoffset: 251.2; transition: stroke-dashoffset 2s ease-out; filter: drop-shadow(0 0 5px var(--house-col)); }
    .gauge-label { position: absolute; top: 50px; left: 50%; transform: translate(-50%, -50%); font-family: 'Bebas Neue'; font-size: 24px; color: #fff; }
    .gauge-title { margin-top: 10px; font-size: 9px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.4); }

    .lb-track { height: 12px; background: rgba(0,0,0,0.4); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; margin-top: 8px; }
    .lb-fill { height: 100%; transition: width 2s; box-shadow: 0 0 15px var(--accent); }

    .btn-main { background: linear-gradient(135deg, var(--house-col), #fff); color: #000; border: none; padding: 22px; border-radius: 24px; width: 100%; font-family: 'Bebas Neue'; font-size: 28px; cursor: pointer; box-shadow: 0 15px 40px rgba(0,242,254,0.3); }
    select { width: 100%; padding: 20px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 20px; font-size: 16px; margin-bottom: 15px; }
  </style>
</head>
<body>
  <div style="max-width: 480px; margin: 0 auto; padding: 20px;">
    
    <!-- ENTRY AREA -->
    <div id="view-entry" class="view active">
      <div style="text-align:center; padding: 40px 0;">
        <img id="app-logo" style="width:110px; height:110px; border-radius:50%; border:3px solid var(--accent); box-shadow:0 0 40px var(--accent); margin-bottom:30px;">
        <h1 style="font-family:'Bebas Neue'; font-size:68px; letter-spacing:10px;">G.O.A.T.S</h1>
        <p style="opacity:0.4; letter-spacing:5px; font-size:10px; margin-top:-10px; font-weight:900;">BATTLE PORTAL v3.0</p>

        <div style="margin-top:50px;">
          <button id="scan-init-btn" class="glass" style="width:100%; border:1px dashed var(--accent); color:var(--accent); font-weight:900; cursor:pointer; margin-bottom:30px; letter-spacing:2px;" onclick="startScanner()">📸 SCAN IDENTITY CHIP</button>
          <div id="reader" style="display:none; width:100%; border-radius:25px; overflow:hidden; border:2px solid var(--accent); margin-bottom:30px;"></div>

          <div class="glass">
             <span style="font-size:10px; font-weight:900; letter-spacing:3px; color:var(--accent); display:block; margin-bottom:15px;">MANUAL SEQUENCE</span>
             <select id="dept-select" onchange="loadStudents()"></select>
             <div id="student-reveal" style="display:none;">
                <select id="student-select"></select>
                <button class="btn-main" onclick="fetchDashboard()">ACTIVATE DASHBOARD</button>
             </div>
          </div>
        </div>
      </div>
    </div>

    <!-- DASHBOARD AREA -->
    <div id="view-dash" class="view">
        <div style="text-align:center; padding:40px 0;">
          <div class="glass">
            <div id="h-pill" style="display:inline-block; padding:10px 25px; border-radius:35px; color:#000; font-weight:900; font-size:12px; margin-bottom:20px;">HOUSE</div>
            <div class="score-3d" id="total-pts">000</div>
            <div id="s-name" style="font-family:'Bebas Neue'; font-size:36px; letter-spacing:5px; color:#fff; stroke:1px #fff; margin-top:20px;">NAME</div>
          </div>
        </div>

        <div class="glass" style="margin-bottom:30px;">
            <p style="font-weight:900; letter-spacing:4px; font-size:10px; color:var(--house-col); margin-bottom:25px; text-align:center;">📊 POWER METRICS (INFOGRAPHIC)</p>
            <div class="infographic-grid" id="infographic-grid"></div>
        </div>

        <div class="glass" style="margin-bottom:30px;">
            <p style="font-weight:900; letter-spacing:3px; font-size:10px; color:var(--house-col); margin-bottom:25px;">🏢 DEPARTMENT HOUSE BATTLE</p>
            <div id="dept-lb"></div>
        </div>

        <div class="glass" style="margin-bottom:80px;">
            <p style="font-weight:900; letter-spacing:3px; font-size:10px; opacity:0.4; margin-bottom:25px;">🌍 COLLEGE WORLD RANKING</p>
            <div id="overall-lb"></div>
        </div>

        <button class="btn-main" style="background:rgba(255,255,255,0.05); color:#fff; font-size:20px; margin-bottom:100px; border:1px solid rgba(255,255,255,0.1);" onclick="location.reload()">OFFLINE TERMINAL</button>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycby4RqyWUJxbYpPAdFtM70npr5ZVqxzeD0BdYNTtSQxvewR23Yo-K2iYJuisIaselNrE/exec";
    let appData = {}, scanner = null;
    const api = (p) => fetch(API_URL, { method:"POST", body:JSON.stringify(p) }).then(res=>res.json());

    async function init() {
      appData = await api({ action: "getInitialData" });
      if(appData.logo) document.getElementById('app-logo').src = appData.logo;
      const ds = document.getElementById('dept-select');
      ds.innerHTML = '<option disabled selected>CHOOSE DEPARTMENT</option>';
      appData.depts.forEach(d => ds.add(new Option(d, d)));
    }

    async function startScanner() {
      document.getElementById('scan-init-btn').style.display='none';
      document.getElementById('reader').style.display='block';
      scanner = new Html5Qrcode("reader");
      await scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (txt) => {
        const p = txt.split('|').map(x=>x.trim());
        if(p.length>=3) { scanner.stop(); fetchDashboard(p[2]); }
      });
    }

    async function loadStudents() {
      const res = await api({ action: "getStudentsByDept", dept: document.getElementById('dept-select').value });
      const ss = document.getElementById('student-select');
      ss.innerHTML = '<option disabled selected>SELECT YOUR NAME</option>';
      res.students.sort((a,b)=>a.name.localeCompare(b.name)).forEach(s => ss.add(new Option(s.name, s.name)));
      document.getElementById('student-reveal').style.display = 'block';
    }

    async function fetchDashboard(scannedName = null) {
      const name = scannedName || document.getElementById('student-select').value;
      const res = await api({ action: "getStudentStats", name });
      renderUI(res);
      document.getElementById('view-entry').classList.remove('active');
      document.getElementById('view-dash').classList.add('active');
    }

    function renderUI(res) {
      document.getElementById('total-pts').innerText = String(res.total).padStart(3,'0');
      document.getElementById('s-name').innerText = res.profile.name;
      const hCfg = appData.houses.find(h=>h.name === res.profile.house);
      if(hCfg) {
        document.documentElement.style.setProperty('--house-col', hCfg.color);
        document.getElementById('h-pill').style.background = hCfg.color;
        document.getElementById('h-pill').innerText = hCfg.name.toUpperCase();
      }

      // INFOGRAPHIC POWER GAUGES
      const cats = ['Activities','Discipline','Academics','Sports','Special'];
      const maxPossible = Math.max(...Object.values(res.breakdown), 50); // Set scale based on max category
      document.getElementById('infographic-grid').innerHTML = cats.map(c => {
        const val = res.breakdown[c] || 0;
        const offset = 251.2 - (251.2 * (val / maxPossible));
        return `
          <div class="gauge-box">
             <svg class="gauge-svg" viewBox="0 0 100 100">
                <circle class="gauge-bg" cx="50" cy="50" r="40" />
                <circle class="gauge-fill" cx="50" cy="50" r="40" style="stroke-dashoffset: ${offset};" />
             </svg>
             <div class="gauge-label">${val}</div>
             <div class="gauge-title">${c}</div>
          </div>`;
      }).join('');

      const makeLB = (data) => {
        if(!data.length) return '<p style="opacity:0.3; font-size:12px; text-align:center;">Waiting for battle data...</p>';
        const max = data[0][1] || 1;
        return data.map(([n, pts]) => {
          const col = appData.houses.find(h=>h.name===n)?.color || '#fff';
          return `<div style="margin-bottom:20px;">
            <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:900; letter-spacing:1px;"><span>${n.toUpperCase()}</span><span>${pts} PTS</span></div>
            <div class="lb-track"><div class="lb-fill" style="width:${(pts/max)*100}%; background:${col}; box-shadow:0 0 15px ${col}"></div></div>
          </div>`;
        }).join('');
      };
      document.getElementById('dept-lb').innerHTML = makeLB(res.deptLeaderboard);
      document.getElementById('overall-lb').innerHTML = makeLB(res.overallLeaderboard);
    }
    init();
  </script>
</body>
</html>
